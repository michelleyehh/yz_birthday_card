<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday! 🎂</title>
    <style>
        :root {
            --env-bg: #fdfbfb;
            --env-back: #e06c81;
            /* 信封內側背景色 */
            --env-front: #ff758c;
            /* 信封正面顏色 */
            --env-flap: #ff7eb3;
            /* 信封上翻蓋顏色 */
            --letter-bg: #ffffff;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 父容器滿版，絕對禁止滑動 */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, var(--env-bg) 0%, #ebedee 100%);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            position: fixed;
            /* 防止 iOS 橡皮筋回彈效應 */
        }

        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* =======================================
           第一階段：信封場景
           ======================================= */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 200px;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.3s ease;
            /* 讓信封有一點浮空感 */
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.15));
        }

        .envelope-wrapper:active {
            transform: scale(0.97);
        }

        /* 信封背板 (內側) */
        .env-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--env-back);
            border-radius: 12px;
            z-index: 1;
        }

        /* 信封裡面的信紙 (冒出頭用的假信紙) */
        .env-letter-stub {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 300px;
            height: 190px;
            background: var(--letter-bg);
            border-radius: 12px 12px 0 0;
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            padding-top: 20px;
        }

        /* 假信紙上的裝飾線條，增加真實感 */
        .stub-decor {
            width: 60%;
            height: 8px;
            background: #ffe3e8;
            border-radius: 4px;
        }

        /* 信封正面下半部 (口袋) */
        .env-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--env-front);
            z-index: 3;
            border-radius: 12px;
            clip-path: polygon(0 0, 50% 45%, 100% 0, 100% 100%, 0 100%);
        }

        /* =======================================
           修改區塊：信封翻蓋與吉伊卡哇封蠟
           ======================================= */
        /* 翻蓋容器 (不裁切，負責 3D 翻轉) */
        .env-flap-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70%;
            z-index: 4;
            transform-origin: top;
            /* z-index 在翻開一半時(0.3s)降級，信紙上升才不會被擋住 */
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0s 0.3s;
        }

        /* 實際的倒三角形 */
        .flap-triangle {
            width: 100%;
            height: 100%;
            background: var(--env-flap);
            border-radius: 12px 12px 0 0;
            clip-path: polygon(0 0, 100% 0, 50% 90%);
        }

        /* 吉伊卡哇封蠟/貼紙 */
        .wax-seal {
            position: absolute;
            /* 10% 剛好對齊倒三角形的尖端 (90%處) */
            bottom: 10%;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 100px;
            /* 因為是雙人圖，寬度拉寬 */
            height: 65px;
            background-color: rgba(0, 0, 0, 0.3);
            /* 對應原圖背景 */
            background-image: url('sister.png');
            background-size: cover;
            background-position: center;
            border: 1px solid #fff;
            border-radius: 40px;
            /* 橢圓形藥丸狀 */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 5;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* 開啟狀態的 Class */
        .env-flap-wrapper.open {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* 點擊拆封時，封蠟會有「啵！」消失的特效 */
        .env-flap-wrapper.open .wax-seal {
            opacity: 0;
            transform: translate(-50%, 50%) scale(1.3);
        }

        .env-letter-stub.rise {
            transform: translateY(-130px);
        }

        /* =======================================
           第二階段：滿版信紙場景
           ======================================= */
        .fullscreen-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--letter-bg);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            display: flex;
            flex-direction: column;
            padding: 3rem 2rem 4rem 2rem;
            justify-content: center;
        }

        .fullscreen-card.show {
            opacity: 1;
            pointer-events: auto;
        }

        .photo-placeholder {
            width: 100%;
            height: 35vh;
            min-height: 250px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border-radius: 16px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.15);
            /* background-image: url('你的照片網址.jpg'); */
            background-size: cover;
            background-position: center;
        }

        .text-section h2 {
            color: var(--env-front);
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .text-section p {
            color: var(--text-color);
            line-height: 1.8;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .signature {
            text-align: right !important;
            font-weight: bold;
            color: var(--env-flap) !important;
            font-size: 1.1rem !important;
            margin-top: 2rem;
        }

        /* 彩帶特效 */
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: var(--env-front);
            opacity: 0;
            z-index: 20;
        }

        /* 提示文字 */
        .hint {
            position: absolute;
            bottom: -50px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
            font-weight: bold;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <!-- 1. 信封開箱場景 -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="env-back"></div>
            <!-- 從信封裡冒出來的信紙上半部 -->
            <div class="env-letter-stub" id="envLetter">
                <div class="stub-decor"></div>
            </div>
            <div class="env-front"></div>

            <!-- 倒三角形翻蓋與封蠟 (替換原本的結構) -->
            <div class="env-flap-wrapper" id="envFlap">
                <div class="flap-triangle"></div>
                <div class="wax-seal"></div> <!-- 你的吉伊卡哇會出現在這裡 -->
            </div>

            <div class="hint">點擊拆開信封 💌</div>
        </div>

        <!-- 2. 滿版信紙場景 -->
        <div class="fullscreen-card" id="fullCard">
            <div class="photo-placeholder">
                放一張你們最可愛的合照吧！
            </div>
            <div class="text-section">
                <h2>🎉 生日快樂！ 🎉</h2>
                <p>給最棒的閨蜜：</p>
                <p>又陪妳長大了一歲！謝謝妳一直以來的陪伴，無論是開心還是難過的時候，都有妳在身邊。<br><br>願妳新的一年每天都閃閃發光，做自己最喜歡的樣子！✨</p>
                <p class="signature">愛妳的 妙妙屋 ❤️</p>
            </div>
        </div>
    </div>

    <script>
        const envelopeWrapper = document.getElementById('envelopeWrapper');
        const envFlap = document.getElementById('envFlap');
        const envLetter = document.getElementById('envLetter');
        const fullCard = document.getElementById('fullCard');
        let isOpened = false;

        envelopeWrapper.addEventListener('click', function () {
            if (isOpened) return;
            isOpened = true;

            // 移除點擊動畫與提示字
            envelopeWrapper.style.cursor = 'default';
            document.querySelector('.hint').style.display = 'none';

            // 步驟 1: 倒三角形翻蓋打開 (封蠟會同時發動淡出放大的特效)
            envFlap.classList.add('open');

            // 步驟 2: 等待翻蓋打開後 (0.6s)，信紙從信封內升起
            setTimeout(() => {
                envLetter.classList.add('rise');
            }, 600);

            // 步驟 3: 信紙升起到頂點後 (1.4s)，整體淡入切換成滿版信紙
            setTimeout(() => {
                envelopeWrapper.style.opacity = '0'; // 隱藏原本的信封
                fullCard.classList.add('show');      // 顯示滿版卡片

                // 步驟 4: 滿版卡片顯示的同時觸發撒花特效
                setTimeout(() => {
                    createConfetti();
                }, 300);
            }, 1400);
        });

        // 撒花特效函數
        function createConfetti() {
            const colors = ['#ff758c', '#ff7eb3', '#fecfef', '#a1c4fd', '#ffd1ff'];
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';

                fullCard.appendChild(confetti);

                const animation = confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg) scale(1)`, opacity: 1 },
                    { transform: `translate3d(${Math.random() * 200 - 100}px, ${window.innerHeight}px, 0) rotate(${Math.random() * 720}deg) scale(0.5)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2500 + 2000,
                    easing: 'cubic-bezier(.37,0,.63,1)'
                });

                animation.onfinish = () => confetti.remove();
            }
        }
    </script>
</body>

</html>
